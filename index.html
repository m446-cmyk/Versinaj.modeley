<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя Презентація</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #1a1a1a; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 10px; }
        .slider-container { width: 100%; max-width: 800px; background: #2a2a2a; border-radius: 12px; padding: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); text-align: center; }
        .slide-img { width: 100%; max-height: 70vh; object-fit: contain; border-radius: 6px; display: none; }
        .slide-img.active { display: block; margin: 0 auto; }
        .controls { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .btn { background: #0066cc; color: white; border: none; padding: 10px 20px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: #004ea3; }
        .counter { font-size: 16px; color: #aaa; }
    </style>
</head>
<body>

    <div class="slider-container">
        <!-- Список ваших слайдів (картинок) -->
        <img class="slide-img active" src="1_20260525_194430_0000.jpg" alt="Слайд 1">
        <img class="slide-img" src="2_20260525_194448_0001.jpg" alt="Слайд 2">
        <img class="slide-img" src="3_20260525_194448_0002.jpg" alt="Слайд 3">
        <img class="slide-img" src="4_20260525_194448_0003.jpg" alt="Слайд 4">
        <img class="slide-img" src="5_20260525_194448_0004.jpg" alt="Слайд 5">
        <img class="slide-img" src="6_20260525_194448_0005.jpg" alt="Слайд 6">
        <img class="slide-img" src="7_20260525_194448_0006.jpg" alt="Слайд 7">
        <img class="slide-img" src="8_20260525_194448_0007.jpg" alt="Слайд 8">
        <img class="slide-img" src="9_20260525_194449_0008.jpg" alt="Слайд 9">
        <img class="slide-img" src="10_20260525_194331_0009.jpg" alt="Слайд 10">
        <img class="slide-img" src="11_20260525_194449_0010.jpg" alt="Слайд 11">

        <div class="controls">
            <button class="btn" onclick="changeSlide(-1)">◀ Назад</button>
            <span class="counter" id="slide-counter">Слайд 1 із 11</span>
            <button class="btn" onclick="changeSlide(1)">Вперед ▶</button>
        </div>
    </div>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide-img');
        const counter = document.getElementById('slide-counter');

        function changeSlide(direction) {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + direction + slides.length) % slides.length;
            slides[currentSlide].classList.add('active');
            counter.textContent = `Слайд ${currentSlide + 1} із ${slides.length}`;
        }
    </script>

</body>
      </html>
