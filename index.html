<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя Презентация</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #1a1a1a; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 10px; }
        .slider-container { width: 100%; max-width: 800px; background: #2a2a2a; border-radius: 12px; padding: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); text-align: center; }
        .slide-box { display: none; width: 100%; max-height: 70vh; }
        .slide-box.active { display: block; }
        .slide-img { width: 100%; max-height: 70vh; object-fit: contain; border-radius: 6px; }
        .controls { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .btn { background: #0066cc; color: white; border: none; padding: 10px 20px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: #004ea3; }
        .counter { font-size: 16px; color: #aaa; }
    </style>
</head>
<body>

    <div class="slider-container">
        <!-- Каждый слайд проверяет два возможных имени файла -->
        <div class="slide-box active">
            <img class="slide-img" src="1_20260525_194430_0000.jpg" onerror="this.src='1-20260525_194430_0000.jpg'; this.onerror=function(){this.src='1_20260525_194430_0000.png'; this.onerror=function(){this.src='1-20260525_194430_0000.png'}}" alt="Слайд 1">
        </div>
        <div class="slide-box">
            <img class="slide-img" src="2_20260525_194448_0001.png" onerror="this.src='2-20260525_194448_0001.png'; this.onerror=function(){this.src='2_20260525_194448_0001.jpg'; this.onerror=function(){this.src='2-20260525_194448_0001.jpg'}}" alt="Слайд 2">
        </div>
        <div class="slide-box">
            <img class="slide-img" src="3_20260525_194448_0002.png" onerror="this.src='3-20260525_194448_0002.png'; this.onerror=function(){this.src='3_20260525_194448_0002.jpg'; this.onerror=function(){this.src='3-20260525_194448_0002.jpg'}}" alt="Слайд 3">
        </div>
        <div class="slide-box">
            <img class="slide-img" src="4_20260525_194448_0003.png" onerror="this.src='4-20260525_194448_0003.png'; this.onerror=function(){this.src='4_20260525_194448_0003.jpg'; this.onerror=function(){this.src='4-20260525_194448_0003.jpg'}}" alt="Слайд 4">
        </div>
        <div class="slide-box">
            <img class="slide-img" src="5_20260525_194448_0004.png" onerror="this.src='5-20260525_194448_0004.png'; this.onerror=function(){this.src='5_20260525_194448_0004.jpg'; this.onerror=function(){this.src='5-20260525_194448_0004.jpg'}}" alt="Слайд 5">
        </div>
        <div class="slide-box">
            <img class="slide-img" src="6_20260525_194448_0005.png" onerror="this.src='6-20260525_194448_0005.png'; this.onerror=function(){this.src='6_20260525_194448_0005.jpg'; this.onerror=function(){this.src='6-20260525_194448_0005.jpg'}}" alt="Слайд 6">
        </div>
        <div class="slide-box">
            <img class="slide-img" src="7_20260525_194448_0006.png" onerror="this.src='7-20260525_194448_0006.png'; this.onerror=function(){this.src='7_20260525_194448_0006.jpg'; this.onerror=function(){this.src='7-20260525_194448_0006.jpg'}}" alt="Слайд 7">
        </div>
        <div class="slide-box">
            <img class="slide-img" src="8_20260525_194448_0007.png" onerror="this.src='8-20260525_194448_0007.png'; this.onerror=function(){this.src='8_20260525_194448_0007.jpg'; this.onerror=function(){this.src='8-20260525_194448_0007.jpg'}}" alt="Слайд 8">
        </div>
        <div class="slide-box">
            <img class="slide-img" src="9_20260525_194449_0008.png" onerror="this.src='9-20260525_194449_0008.png'; this.onerror=function(){this.src='9_20260525_194449_0008.jpg'; this.onerror=function(){this.src='9-20260525_194449_0008.jpg'}}" alt="Слайд 9">
        </div>
        <div class="slide-box">
            <img class="slide-img" src="10_20260525_194331_0009.jpg" onerror="this.src='10-20260525_194331_0009.jpg'; this.onerror=function(){this.src='10_20260525_194331_0009.png'; this.onerror=function(){this.src='10-20260525_194331_0009.png'}}" alt="Слайд 10">
        </div>
        <div class="slide-box">
            <img class="slide-img" src="11_20260525_194449_0010.jpg" onerror="this.src='11-20260525_194449_0010.jpg'; this.onerror=function(){this.src='11_20260525_194449_0010.png'; this.onerror=function(){this.src='11-20260525_194449_0010.png'}}" alt="Слайд 11">
        </div>

        <div class="controls">
            <button class="btn" onclick="changeSlide(-1)">◀ Назад</button>
            <span class="counter" id="slide-counter">Слайд 1 из 11</span>
            <button class="btn" onclick="changeSlide(1)">Вперед ▶</button>
        </div>
    </div>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide-box');
        const counter = document.getElementById('slide-counter');

        function changeSlide(direction) {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + direction + slides.length) % slides.length;
            slides[currentSlide].classList.add('active');
            counter.textContent = `Слайд ${currentSlide + 1} из ${slides.length}`;
        }
    </script>

</body>
</html>
